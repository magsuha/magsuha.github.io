<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Game</title>
<style>
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background:#111;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
  }
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 34px;
    padding: 20px;
  }
  .score{
    font-family: Arial, sans-serif;
    font-size: 32px;
    font-weight:bold;
    color: #6bff8a;
    min-width: 2ch;
    text-align:center;
    transition: color .15s ease;
  }
  .score.neg{ color:#ff5c5c; }
 
  .row{
    display:flex;
    gap: 12px;
    justify-content:center;
  }
  .card{
    width: 130px;
    height: 158px;
    background: #1c1c1c;
    border-radius: 10px;
    border: 2px solid #2c2c2c;
    display:flex; align-items:center; justify-content:center;
    padding: 10px;
    flex-shrink:0;
    transition: transform .18s ease, opacity .18s ease, border-color .15s ease;
  }
  .card img{
    max-width:100%; max-height:100%;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
  }
  .card.active{
    border-color: #4fd1e0;
  }
  .card.entering{
    animation: enterCard .22s ease both;
  }
  @keyframes enterCard{
    from{ opacity:0; transform: translateX(24px) scale(0.9); }
    to{ opacity:1; transform: translateX(0) scale(1); }
  }

  .controls{
    display:flex; align-items:center; justify-content:center; gap:26px;
  }
  .btn{
    font-family: Arial, sans-serif;
    font-size: 28px;
    font-weight:bold;
    width: 88px; height: 88px;
    border-radius: 50%;
    border: none;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform .08s ease, filter .1s ease;
  }
  .btn:active{ transform: scale(0.9); }
  .btn-match{ background:#2f9e57; color:#eafff0; }
  .btn-match:hover{ filter: brightness(1.1); }
  .btn-diff{ background:#c23a3a; color:#ffecec; }
  .btn-diff:hover{ filter: brightness(1.1); }
  .btn:disabled{
    filter: grayscale(0.7) brightness(0.55);
    cursor:not-allowed;
  }
 .end-overlay{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.9);
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 30px;
    z-index: 10;
  }
  .end-overlay.show{ display:flex; }
  .end-score{
    font-family: Arial, sans-serif;
    font-size: 80px;
    font-weight:bold;
    color: #6bff8a;
  }
  .end-score.neg{ color:#ff5c5c; }
  #endLink{ display:inline-block; }
  #endLinkImg{
    max-width: 260px;
    max-height: 260px;
    cursor:pointer;
    transition: transform .1s ease;
  }
  #endLinkImg:hover{ transform: scale(1.05); }
</style>
</head>
<body>

<div class="stage">
  <div class="score" id="scoreDisplay">0</div>
  <div class="row" id="cardRow"></div>
  <div class="controls">
    <button class="btn btn-diff" id="btnDiff">[x]</button>
    <button class="btn btn-match" id="btnMatch">[v]</button>
  </div>
</div>
 
<div class="end-overlay" id="endOverlay">
  <div class="end-score" id="endScore">0</div>
  <a href="thesynth.html" id="endLink">
    <img src="images/synth.png" alt="continue" id="endLinkImg">
  </a>
</div>
 
<audio id="bgTrack" src="freekwhensees.mp3" preload="auto"></audio>
<audio id="endTrack" src="lofi beat.mp3" preload="auto"></audio>
 
<script>
(function(){
  const IMAGES = {
   coffee: "images/coffee.png",
   synth: "images/synth.png"
  };

  const cardRow = document.getElementById('cardRow');
  const btnMatch = document.getElementById('btnMatch');
  const btnDiff = document.getElementById('btnDiff');
  const bgTrack = document.getElementById('bgTrack');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const endOverlay = document.getElementById('endOverlay');
  const endScore = document.getElementById('endScore');
  const endTrack = document.getElementById('endTrack');
 
  let score = 0;
  let cards = [];
  let gameActive = false;
  let gameOver = false;
  let audioAvailable = true;

  let audioCtx = null;
 
  function updateScore(){
    scoreDisplay.textContent = score;
    scoreDisplay.classList.toggle('neg', score < 0);
  }
 
  function beep(){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 220;
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.32);
    }catch(e){}
  }

  function randomType(){
    return Math.random() < 0.5 ? 'coffee' : 'synth';
  }

  function makeCardEl(type){
    const div = document.createElement('div');
    div.className = 'card';
    const img = document.createElement('img');
    img.src = IMAGES[type];
    img.alt = '';
    div.appendChild(img);
    return div;
  }

  function layoutPositions(){
    Array.from(cardRow.children).forEach((el, i) => {
      el.classList.toggle('active', i === 0 || i === 1);
    });
  }

  function initRow(){
    cardRow.innerHTML = '';
    cards = [];
    for(let i=0;i<5;i++){
      const type = randomType();
      const el = makeCardEl(type);
      cardRow.appendChild(el);
      cards.push({type, el});
    }
    layoutPositions();
  }

  function addCardToRight(){
    const type = randomType();
    const el = makeCardEl(type);
    el.classList.add('entering');
    cardRow.appendChild(el);
    cards.push({type, el});
  }

  function setButtonsEnabled(enabled){
    btnMatch.disabled = !enabled;
    btnDiff.disabled = !enabled;
  }

  let practiceLeft = 0;
  const PRACTICE_TOTAL = 20;

  function startGame(){
    score = 0;
    updateScore();
    gameOver = false;
    endOverlay.classList.remove('show');
    /*initRow();*/
    gameActive = true;

    if(audioAvailable){
      bgTrack.currentTime = 0;
      bgTrack.play().catch(() => {
        audioAvailable = false;
        practiceLeft = PRACTICE_TOTAL;
      });
    } else {
      practiceLeft = PRACTICE_TOTAL;
    }
  }

  function endGame(){
    gameActive = false;
    gameOver = true;
    bgTrack.pause();
    setButtonsEnabled(false);
    endScore.textContent = score;
    endScore.classList.toggle('neg', score < 0);
    endOverlay.classList.add('show');
    endTrack.currentTime = 0;
    endTrack.play().catch(() => {});
  }

  bgTrack.addEventListener('ended', () => {
    if(gameActive) endGame();
  });

  bgTrack.addEventListener('error', () => { audioAvailable = false; });

  setTimeout(() => {
    if(bgTrack.readyState === 0) audioAvailable = false;
  }, 1200);

  function handleMistake(){
    if(audioAvailable && !bgTrack.paused){
      bgTrack.pause();
    }
    beep();
    /*setTimeout(() => {
      if(gameActive && audioAvailable) bgTrack.play().catch(()=>{});
    }, 320);*/
  }

  function answer(userSaysMatch){
    if(gameOver) return;
    if(!gameActive){
      startGame();
    }

    const actualMatch = cards[0].type === cards[1].type;
    const correct = (userSaysMatch === actualMatch);

    if(correct){
      score += 1;
      if(audioAvailable && bgTrack.paused){
        bgTrack.play();
      }
    } else {
      score -= 1;
      handleMistake();
    }
    updateScore();
   
    const leaving = cards.shift();
    leaving.el.remove();
    addCardToRight();
    layoutPositions();

    if(!audioAvailable){
      practiceLeft -= 1;
      if(practiceLeft <= 0){
        endGame();
      }
    }
  }

  btnMatch.addEventListener('click', () => answer(true));
  btnDiff.addEventListener('click', () => answer(false));

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if(k === 'v' || k === 'enter'){ answer(true); }
    else if(k === 'x' || k === 'escape'){ answer(false); }
  });

  initRow();
})();
</script>

</body>
</html>
