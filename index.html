<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Audio Player</title>
  <style>
    /* Reset & Base Styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #121212;
      color: #ffffff;
      
      background-image: url('images/myface.jpg');
      background-repeat: no-repeat; 
      /* Centers the image on the screen */
      background-position: center; 
      /* Scales the image to beautifully cover the entire screen */
      background-size: cover; 
      /* Keeps the background fixed in place while scrolling */
      background-attachment: fixed; 
  
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Player Container */
    .audio-player {
      bottom: 20px; /* 20px gap from the bottom edge */
      right: 20px;  /* 20px gap from the right edge */
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      width: 350px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    /* Track Info */
    .track-info {
      margin-bottom: 15px;
    }

    .track-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .track-artist {
      font-size: 0.85rem;
      color: #b3b3b3;
    }

    /* Controls Layout */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    /* Play/Pause Button */
    .play-btn {
      background: #ffffff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .play-btn:hover {
      transform: scale(1.05);
      background-color: #e6e6e6;
    }

    .play-btn svg {
      width: 18px;
      height: 18px;
      fill: #121212;
    }

    /* Progress Bar */
    .progress-container {
      flex-grow: 1;
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #3e3e3e;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #1db954; /* Clean spotty-green color */
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    /* Time Display */
    .time-container {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #b3b3b3;
      margin-top: -5px;
      padding-left: 59px; /* Aligns visually with the progress bar */
    }
  </style>
</head>
<body>

  <audio id="audio-element" src="ozhivaet noch'yu.mp3" preload="metadata"></audio>

  <div class="audio-player">
    <div class="track-info">
      <div class="track-title">Ozhivaet Nochyu</div>
      <div class="track-artist">Etot mir zovet nas</div>
    </div>

    <div class="controls-row">
      <button class="play-btn" id="play-button" aria-label="Play">
        <svg id="play-icon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>

      <div class="progress-container" id="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="time-container">
      <span id="current-time">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

    <div class="linktothetape-container">
      <a href="thetape.html">
        <img src="images/thetape_nobackground.png" alt="Clickable Button Image" style="width: 150px; height: auto;">
      </a>
    </div>
  
  <script>
    const audio = document.getElementById('audio-element');
    const playBtn = document.getElementById('play-button');
    const playIcon = document.getElementById('play-icon');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');

    // SVG Path details for Play and Pause shapes
    const playPath = "M8 5v14l11-7z";
    const pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

    // Toggle Play / Pause
    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playIcon.querySelector('path').setAttribute('d', pausePath);
      } else {
        audio.pause();
        playIcon.querySelector('path').setAttribute('d', playPath);
      }
    }

    playBtn.addEventListener('click', togglePlay);

    // Format raw seconds into MM:SS
    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // Load Metadata to show total duration immediately
    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    // Update progress bar and running timestamp as the track plays
    audio.addEventListener('timeupdate', () => {
      const percentage = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percentage}%`;
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    // Click anywhere on progress bar to scrub / seek
    progressContainer.addEventListener('click', (e) => {
      const width = progressContainer.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;

      if (duration) {
        audio.currentTime = (clickX / width) * duration;
      }
    });

    // Reset UI when track ends
    audio.addEventListener('ended', () => {
      playIcon.querySelector('path').setAttribute('d', playPath);
      progressFill.style.width = '0%';
      currentTimeEl.textContent = "0:00";
    });
  </script>

</body>
</html>
